<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Test-Shop</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f2f2f2;
  }
  header {
    background:#4CAF50;
    color:white;
    padding:15px;
    text-align:center;
  }
  #loginPanel, #shop, #cartPanel {
    max-width:600px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
  }
  input, button {
    padding:8px;
    margin:5px 0;
  }
  .product {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .product img {
    width:80px;
    border-radius:5px;
  }
  button {
    cursor:pointer;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
  }
  #cartItems div {
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
  }
</style>
</head>
<body>

<header>
  <h1>🛍 Test-Shop</h1>
</header>

<div id="loginPanel">
  <h2>Login / Registrierung (optional)</h2>
  <input id="username" placeholder="Benutzername"><br>
  <input id="password" type="password" placeholder="Passwort"><br>
  <button onclick="login()">Login / Registrieren</button>
  <p id="userRole">Rolle: Gast</p>
</div>

<div id="shop">
  <h2>Produkte</h2>
  <div id="products"></div>
</div>

<div id="cartPanel">
  <h2>Warenkorb</h2>
  <div id="cartItems"></div>
  <p>Gesamt: <span id="total">0</span>€</p>
</div>

<script>
// Benutzer & Rollen
let role = "Gast";
let currentUser = "";

// Produkte (Test-Kleider)
let products = [
  {id:1, name:"Rotes Kleid", price:49.99, img:"https://via.placeholder.com/100x150/FF0000/FFFFFF?text=Kleid+1"},
  {id:2, name:"Blaues Kleid", price:59.99, img:"https://via.placeholder.com/100x150/0000FF/FFFFFF?text=Kleid+2"},
  {id:3, name:"Grünes Kleid", price:39.99, img:"https://via.placeholder.com/100x150/00FF00/FFFFFF?text=Kleid+3"},
  {id:4, name:"Gelbes Kleid", price:44.99, img:"https://via.placeholder.com/100x150/FFFF00/000000?text=Kleid+4"}
];

// Warenkorb
let cart = [];

// Login / Registrierung
function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  
  if(username){
    role = "Benutzer";
    currentUser = username;
    document.getElementById("userRole").innerText = `Rolle: ${role} (${currentUser})`;
  } else {
    role = "Gast";
    currentUser = "";
    document.getElementById("userRole").innerText = "Rolle: Gast";
  }
  loadProducts();
}

// Produkte anzeigen
function loadProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";
  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <div>
        <img src="${p.img}" alt="${p.name}">
        <strong>${p.name}</strong> - ${p.price}€
      </div>
      <button onclick="addToCart(${p.id})">In Warenkorb</button>
    `;
    container.appendChild(div);
  });
}

// In Warenkorb legen
function addToCart(id){
  const prod = products.find(p=>p.id===id);
  if(prod) cart.push(prod);
  renderCart();
}

// Warenkorb anzeigen
function renderCart(){
  const container = document.getElementById("cartItems");
  container.innerHTML = "";
  let total = 0;
  cart.forEach((item, index)=>{
    total += item.price;
    const div = document.createElement("div");
    div.innerHTML = `
      ${item.name} - ${item.price}€
      <button onclick="removeFromCart(${index})">❌</button>
    `;
    container.appendChild(div);
  });
  document.getElementById("total").innerText = total.toFixed(2);
}

// Aus Warenkorb entfernen
function removeFromCart(index){
  cart.splice(index,1);
  renderCart();
}

// Seite initial laden
loadProducts();
renderCart();
</script>

</body>
</html>
